	  <!-- SCRIPT DE CONTROL DEL JOYSTICK -->
	 // Configuración del joystick táctil
      const options = {
        zone: document.getElementById('joystick-zone'),
        mode: 'static',
        position: { left: '50%', top: '50%' },
        color: '#ffffff',
        size: 100
      };

      const manager = nipplejs.create(options);
      const rig = document.getElementById('rig');
      const camera = document.getElementById('camera');
      
      let moveX = 0;
      let moveZ = 0;
      const speed = 0.08; // Velocidad de movimiento en el móvil

      // Detectar cuando el usuario mueve el joystick
      manager.on('move', function (evt, data) {
        if (data.direction) {
          // Calculamos la dirección basándonos en el ángulo del joystick
          const angle = data.angle.radian;
          
          // Invertimos y ajustamos para que coincida con la vista de la cámara
          moveX = Math.cos(angle);
          moveZ = -Math.sin(angle);
        }
      });

      // Detener el movimiento al soltar el joystick
      manager.on('end', function () {
        moveX = 0;
        moveZ = 0;
      });

      // Bucle de renderizado para mover al jugador en la dirección que mira la cámara
      function tick() {
        if (moveX !== 0 || moveZ !== 0) {
          // Obtener la rotación actual de la cámara (Y es el giro horizontal)
          const rotation = camera.getAttribute('rotation');
          const angleY = rotation.y * Math.PI / 180;

          // Matriz de rotación para avanzar hacia donde mira el usuario
          const cos = Math.cos(angleY);
          const sin = Math.sin(angleY);

          // Traducir el movimiento del joystick al espacio 3D relativo a la cámara
          const targetX = moveX * cos - moveZ * sin;
          const targetZ = moveX * sin + moveZ * cos;

          // Aplicar la nueva posición al 'rig' (contenedor de la cámara)
          const position = rig.getAttribute('position');
          position.x += targetX * speed;
          position.z += targetZ * speed;
          rig.setAttribute('position', position);
        }
        requestAnimationFrame(tick);
      }
      
      // Iniciar el bucle de movimiento
      tick();
	
</script>
